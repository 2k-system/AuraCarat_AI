<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraCarat AI — Pricing Engine</title>
    <link rel="stylesheet" href="/templates/style.css">
</head>
<body>

    <div class="container">
        <h1>💎 AuraCarat AI Pricing Engine</h1>
        <p class="subtitle">Enter physical attributes below for an instant precision valuation</p>
        
        <form id="predictionForm" class="form-grid">
            
            <div class="form-group">
                <label for="carat">Carat Weight</label>
                <input type="number" id="carat" name="carat" step="0.01" value="0.7" min="0.1" max="5.0" required>
            </div>

            <div class="form-group">
                <label for="cut">Cut Quality</label>
                <select id="cut" name="cut" required>
                    <option value="Ideal">Ideal</option>
                    <option value="Premium">Premium</option>
                    <option value="Very Good">Very Good</option>
                    <option value="Good">Good</option>
                    <option value="Fair">Fair</option>
                </select>
            </div>

            <div class="form-group">
                <label for="color">Color Grade</label>
                <select id="color" name="color" required>
                    <option value="G">G</option>
                    <option value="E">E</option>
                    <option value="F">F</option>
                    <option value="H">H</option>
                    <option value="D">D</option>
                    <option value="I">I</option>
                    <option value="J">J</option>
                </select>
            </div>

            <div class="form-group">
                <label for="clarity">Clarity Grade</label>
                <select id="clarity" name="clarity" required>
                    <option value="SI1">SI1</option>
                    <option value="VS2">VS2</option>
                    <option value="SI2">SI2</option>
                    <option value="VS1">VS1</option>
                    <option value="VVS2">VVS2</option>
                    <option value="VVS1">VVS1</option>
                    <option value="IF">IF</option>
                    <option value="I1">I1</option>
                </select>
            </div>

            <div class="form-group">
                <label for="depth">Total Depth %</label>
                <input type="number" id="depth" name="depth" step="0.1" value="61.5" min="43.0" max="79.0" required>
            </div>

            <div class="form-group">
                <label for="table">Table Width %</label>
                <input type="number" id="table" name="table" step="0.1" value="57.0" min="43.0" max="95.0" required>
            </div>

            <div class="form-group">
                <label for="x">Length (x) mm</label>
                <input type="number" id="x" name="x" step="0.01" value="5.7" min="0.1" required>
            </div>

            <div class="form-group">
                <label for="y">Width (y) mm</label>
                <input type="number" id="y" name="y" step="0.01" value="5.7" min="0.1" required>
            </div>

            <div class="form-group">
                <label for="z">Depth (z) mm</label>
                <input type="number" id="z" name="z" step="0.01" value="3.5" min="0.1" required>
            </div>

            <button type="submit">Calculate Valuation</button>
        </form>

        <div id="result" class="result-box"></div>
    </div>

    <script>
        document.getElementById('predictionForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const resultBox = document.getElementById('result');
            resultBox.style.display = 'none';
            
            // Extract raw values
            const carat = parseFloat(document.getElementById('carat').value);
            const depth = parseFloat(document.getElementById('depth').value);
            const table = parseFloat(document.getElementById('table').value);
            const x = parseFloat(document.getElementById('x').value);
            const y = parseFloat(document.getElementById('y').value);
            const z = parseFloat(document.getElementById('z').value);

            // Hard Javascript Verification Firewall 
            if (carat <= 0 || depth <= 0 || table <= 0 || x <= 0 || y <= 0 || z <= 0) {
                resultBox.innerHTML = `❌ Validation Error: Physical dimensions (Carat, Depth, Table, X, Y, Z) cannot be zero or negative values.`;
                resultBox.style.background = 'rgba(254, 242, 242, 0.9)';
                resultBox.style.color = '#991b1b';
                resultBox.style.display = 'block';
                return; // Stop the script entirely right here!
            }
            
            // Map valid payload
            const payload = {
                carat: carat,
                cut: document.getElementById('cut').value,
                color: document.getElementById('color').value,
                clarity: document.getElementById('clarity').value,
                depth: depth,
                table: table,
                x: x,
                y: y,
                z: z
            };

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (response.ok && data.estimated_price !== undefined) {
                    resultBox.innerHTML = `💎 Valuation: $${data.estimated_price.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
                    resultBox.style.background = 'rgba(239, 246, 255, 0.9)';
                    resultBox.style.color = '#1e40af';
                } else {
                    // This will display if the Pydantic API firewall catches something wrong
                    resultBox.innerHTML = `❌ API Validation Refused: Input constraints violated.`;
                    resultBox.style.background = 'rgba(254, 242, 242, 0.9)';
                    resultBox.style.color = '#991b1b';
                }
            } catch (error) {
                resultBox.innerHTML = '❌ Network error connecting to machine learning server gateway pipeline.';
                resultBox.style.background = 'rgba(254, 242, 242, 0.9)';
                resultBox.style.color = '#991b1b';
            }

            resultBox.style.display = 'block';
        });
    </script>
</body>
</html>
